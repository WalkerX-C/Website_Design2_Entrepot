<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Search & Filter Products</title>
</head>
<body>
    <header class="top-header">
        <nav class="nav-bar">
            <a href="homepage.html">HomePage</a>
            <a href="search.html">Search</a>
            <a href="sell.html">Seller Page</a>
            <a href="feedback.html">Feedback</a>
            <a href="aboutus.html">About Us</a>
        </nav>

        <div class="header-actions">
            <a class="bag-top-link" href="bag.html">Bag (<span id="nav-bag-count">0</span>)</a>
        </div>
    </header>

    <main class="search-container">
        <div class="search-header">
            <input type="text" class="search-input" placeholder="Search accessories..." id="searchInput">
            <select class="sort-dropdown" id="sortSelect">
                <option value="relevancy">Sort by: Relevancy</option>
                <option value="topSellers">Sort by: Popularity</option>
                <option value="newest">Sort by: Newest</option>
                <option value="priceLH">Sort by: Price (Low to High)</option>
                <option value="priceHL">Sort by: Price (High to Low)</option>
            </select>
        </div>

        <div class="layout-wrapper">
            <aside class="filter-sidebar">
                <div class="filter-group">
                    <h3>Product Type</h3>
                    <label class="filter-label"><input type="checkbox" value="Phone" class="type-filter"> Phone</label>
                    <label class="filter-label"><input type="checkbox" value="Tablet" class="type-filter"> Tablet</label>
                    <label class="filter-label"><input type="checkbox" value="Laptop" class="type-filter"> Laptop</label>
                    <label class="filter-label"><input type="checkbox" value="Console" class="type-filter"> Console</label>
                    <label class="filter-label"><input type="checkbox" value="Earbuds" class="type-filter"> Earbuds</label>
                    <label class="filter-label"><input type="checkbox" value="Headphones" class="type-filter"> Headphones</label>
                </div>
            </aside>

            <section class="product-grid" id="resultsGrid">
            </section>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
